# ─────────────────────────────────────────────────────────────
# Role Back — Déploiement de l'API en conteneur Docker
# ─────────────────────────────────────────────────────────────

---
- name: Se connecter à Docker Hub
  docker_login:
    username: "{{ docker_username }}"
    password: "{{ lookup('env', 'DOCKER_PASSWORD') | default('', true) }}"
  when: lookup('env', 'DOCKER_PASSWORD') | default('', true) != ''
  ignore_errors: yes

- name: Tirer la dernière image de l'API
  docker_image:
    name: "{{ docker_username }}/todo-api"
    tag: latest
    source: pull
    force_source: yes

- name: Arrêter et supprimer le conteneur API existant (si présent)
  docker_container:
    name: todo-api
    state: absent
  ignore_errors: yes

- name: Lancer le conteneur API
  docker_container:
    name: todo-api
    image: "{{ docker_username }}/todo-api:latest"
    state: started
    restart_policy: always
    published_ports:
      - "{{ api_port }}:5000"
    env:
      DB_HOST: "{{ db_host }}"
      DB_PORT: "{{ db_port }}"
      DB_USER: "{{ db_user }}"
      DB_PASSWORD: "{{ db_password }}"
      DB_NAME: "{{ db_name }}"
      PORT: "5000"
      NODE_ENV: "production"

- name: Attendre que l'API soit prête
  wait_for:
    port: "{{ api_port }}"
    delay: 5
    timeout: 60

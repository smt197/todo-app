# ─────────────────────────────────────────────────────────────
# Docker Compose — Développement local (les 3 couches)
# Usage : docker compose up -d
# ─────────────────────────────────────────────────────────────

services:
  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: todo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-tododb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Backend (Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tododb}
      PORT: "5000"
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # Frontend (React via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: todo-front
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Nginx reverse proxy (uniquement pour le test local)
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
